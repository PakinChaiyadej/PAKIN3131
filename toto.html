<?php
// กำหนดค่าให้ตัวแปร $A มีค่าเป็นข้อความว่า "B"
$A = "B"; 

// กำหนดค่าให้ตัวแปรซ้อนตัวแปร ($$A จะหมายถึงตัวแปร $B เพราะ $A มีค่าเป็น "B")
$$A = 20.5; 

echo "ผลลัพธ์<br><br>";
// แสดงผลข้อความ $A=B (ใช้ \ เพื่อไม่ให้ระบบมองเป็นตัวแปรตอนแสดงผล)
echo "\$A=" . $A . "<br>";

// แสดงผลข้อความ $$A=20.5
echo "\$\$A=" . $$A . "<br>";

// แสดงผลข้อความ $B=20.5 (ค่าของ $B จะถูกเปลี่ยนตาม $$A ด้านบน)
echo "\$B=" . $B . "<br>";
?>
